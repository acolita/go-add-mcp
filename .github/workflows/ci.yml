name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (go ${{ matrix.go }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # Use bash everywhere (incl. Windows runners) so flags like
    # -coverprofile=coverage.out aren't mangled by PowerShell's argument parser.
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ["1.23", "1.24"]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test -race -coverprofile=coverage.out ./...

      - name: coverage summary
        if: matrix.os == 'ubuntu-latest' && matrix.go == '1.24'
        run: go tool cover -func=coverage.out | tail -n 1
